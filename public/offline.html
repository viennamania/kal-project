<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Oasis Token Arcade</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Plus Jakarta Sans", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(122, 219, 255, 0.24), transparent 32%),
          radial-gradient(circle at bottom right, rgba(255, 154, 184, 0.25), transparent 36%),
          #f7fbff;
        color: #1e2451;
      }

      .card {
        width: min(92vw, 420px);
        border: 1px solid rgba(255, 255, 255, 0.85);
        border-radius: 32px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 24px 60px rgba(30, 36, 81, 0.14);
        padding: 28px 24px;
        backdrop-filter: blur(20px);
      }

      h1 {
        font-size: clamp(2rem, 8vw, 3rem);
        line-height: 0.95;
        margin: 0;
      }

      p {
        margin: 14px 0 0;
        color: rgba(30, 36, 81, 0.7);
        line-height: 1.7;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(122, 219, 255, 0.18);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        margin-bottom: 16px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="tag">Offline</div>
      <h1>Oasis Token Arcade</h1>
      <p>네트워크가 잠시 연결되지 않았습니다. 연결이 다시 살아나면 홈 화면에서 바로 이어서 토큰과 지갑을 확인할 수 있습니다.</p>
    </main>
  </body>
</html>
